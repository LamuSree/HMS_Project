{% extends "layout.html" %}

{% block content %}

<div class="container">

<h2 class="title">🧪 Order Lab Tests</h2>

<div class="card">

<form method="POST">

<!-- CSRF TOKEN -->
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div>

<label><strong>Patient ID</strong></label>
<input type="text" name="patient_id" placeholder="Enter Patient ID" required>

</div>

<div>

<label><strong>Select Test</strong></label>
<select name="test" required>
<option value="">-- Choose Test --</option>
<option>Blood Test</option>
<option>X-Ray</option>
<option>MRI Scan</option>
<option>CT Scan</option>
</select>

</div>

<div>

<label><strong>Remarks</strong></label>
<textarea name="remarks" placeholder="Optional doctor notes..."></textarea>

</div>

<br>

<button type="submit" class="btn">🔬 Order Test</button>

</form>

</div>

</div>

<style>

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.title{
font-size:24px;
margin-bottom:20px;
color:#1e88e5;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
min-height:80px;
}

.btn{
margin-top:20px;
background:#1e88e5;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.btn:hover{
background:#1565c0;
}

</style>

{% endblock %}

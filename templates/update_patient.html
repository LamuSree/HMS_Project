{% extends "layout.html" %}

{% block content %}

<style>

.page-container{
    max-width:900px;
    margin:40px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.title{
    color:#1e88e5;
    font-size:28px;
    margin-bottom:25px;
    font-weight:600;
}

.form-group{
    margin-bottom:20px;
}

label{
    font-weight:600;
    display:block;
    margin-bottom:8px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.update-btn{
    background:#1e88e5;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.update-btn:hover{
    background:#1565c0;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 18px;
    background:#1e88e5;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.back-btn:hover{
    background:#1565c0;
}

</style>

<div class="page-container">

<div class="card">

<h2 class="title">✏️ Update Patient Information</h2>

<form method="POST">

<div class="form-group">
<label>Patient ID</label>
<input type="text" name="patient_id" required>
</div>

<div class="form-group">
<label>Diagnosis</label>
<input type="text" name="diagnosis">
</div>

<div class="form-group">
<label>Treatment Plan</label>
<textarea name="treatment"></textarea>
</div>

<button class="update-btn" type="submit">
Update Record
</button>

</form>

<a class="back-btn" href="/doctor_dashboard">
⬅ Back to Dashboard
</a>

</div>

</div>

{% endblock %}

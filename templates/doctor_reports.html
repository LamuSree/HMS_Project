{% extends "layout.html" %}

{% block content %}

<style>

.page-container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.08);
}

.title{
    color:#1e88e5;
    font-size:24px;
    margin-bottom:20px;
}

.table{
    width:100%;
    border-collapse:collapse;
}

.table th{
    background:#1e88e5;
    color:white;
    padding:12px;
    text-align:left;
}

.table td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.table tr:hover{
    background:#f4f6f9;
}

.view-btn{
    background:#43a047;
    color:white;
    padding:6px 12px;
    text-decoration:none;
    border-radius:5px;
    font-size:14px;
}

.view-btn:hover{
    background:#2e7d32;
}

.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#1e88e5;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

</style>

<div class="page-container">

<div class="card">

<h2 class="title">📋 Patient Reports</h2>

<table class="table">

<tr>
<th>ID</th>
<th>Patient</th>
<th>Report</th>
<th>Action</th>
</tr>

{% for r in reports %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>

<td>📄 {{ r[2] }}</td>

<td>
<a class="view-btn"
   href="{{ url_for('static', filename='uploads/' + r[2]) }}"
   target="_blank">
   View Report
</a>
</td>

</tr>
{% endfor %}

</table>

<a class="back-btn" href="/doctor_dashboard">⬅ Back to Dashboard</a>

</div>

</div>

{% endblock %}

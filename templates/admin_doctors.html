<!DOCTYPE html>
<html>
<head>

<title>HMS 2026 - Doctors</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#1e88e5,#42a5f5);
    margin:0;
}

.container{
    width:900px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e88e5;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ccc;
    text-align:center;
}

tr:nth-child(even){
    background:#f4f6f9;
}

/* Status badge */
.status{
    padding:5px 12px;
    border-radius:6px;
    color:white;
    font-weight:bold;
}

.active{
    background:#43a047;
}

.inactive{
    background:#e53935;
}

</style>

</head>

<body>

<div class="container">

<h1>🏥 HMS 2026 - Doctors Management</h1>

<table>

<tr>
<th>Name</th>
<th>Specialization</th>
<th>Status</th>
<th>Last Login</th>
</tr>

{% for d in doctors %}
<tr>

<!-- Name -->
<td>{{ d[0] }}</td>

<!-- Specialization -->
<td>{{ d[1] }}</td>

<!-- Status -->
<td>
    {% if d[2] %}
        <span class="status active">{{ d[2] }}</span>
    {% else %}
        <span class="status inactive">Not Set</span>
    {% endif %}
</td>

<!-- Last Login -->
<td>
    {{ d[3] if d[3] else '--' }}
</td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>

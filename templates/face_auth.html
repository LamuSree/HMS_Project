<!DOCTYPE html>
<html>
<head>
<title>Face Authentication</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    text-align:center;
    padding-top:120px;
}

.container{
    background:white;
    width:400px;
    margin:auto;
    padding:40px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    color:#2c3e50;
}

p{
    color:#555;
}

.face-btn{
    background-color:#007BFF;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

.face-btn:hover{
    background-color:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>🔐 Face Recognition Required</h2>

<p>Please click the button below to start face authentication.</p>

<a href="/verify_face">
<button class="face-btn">Start Face Recognition</button>
</a>

</div>

</body>
</html>
